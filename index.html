<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 绘画工坊 - AI Painter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --accent-primary: #00d4aa;
            --accent-secondary: #7b68ee;
            --accent-tertiary: #ff6b9d;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --border-color: #2a2a3a;
            --success: #00d4aa;
            --error: #ff6b9d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .background-effects {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            animation: float 20s ease-in-out infinite;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--accent-primary); top: -100px; right: -100px; }
        .orb-2 { width: 350px; height: 350px; background: var(--accent-secondary); bottom: -100px; left: -100px; animation-delay: -7s; }
        .orb-3 { width: 200px; height: 200px; background: var(--accent-tertiary); top: 30%; left: 50%; animation-delay: -12s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.05); }
        }
        .grid-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
        }

        .top-bar {
            position: relative;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 28px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(0, 212, 170, 0.3);
        }
        .logo-icon svg { width: 24px; height: 24px; fill: white; }
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .status-indicators {
            display: flex;
            gap: 12px;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            transition: all 0.3s;
        }
        .status-badge.active {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: all 0.3s;
        }
        .status-badge.active .status-dot {
            background: var(--accent-primary);
            box-shadow: 0 0 8px var(--accent-primary);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .settings-btn {
            padding: 10px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.85rem;
        }
        .settings-btn:hover {
            border-color: var(--accent-secondary);
            color: var(--accent-secondary);
            transform: translateY(-1px);
        }
        .settings-btn svg { width: 16px; height: 16px; }

        /* Main Layout */
        .main-container {
            position: relative;
            z-index: 10;
            max-width: 100%;
            margin: 0 auto;
            padding: 24px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1400px;
        }

        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        /* Left Panel - Robot & Chat */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Robot Card */
        .robot-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        .robot-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary), var(--accent-tertiary));
        }

        .robot-container {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* SVG Robot */
        .robot-svg {
            width: 90px;
            height: 90px;
            flex-shrink: 0;
        }
        .robot-svg .robot-body {
            fill: var(--bg-secondary);
            stroke: var(--accent-primary);
            stroke-width: 2;
            animation: robotPulse 2s ease-in-out infinite;
        }
        .robot-svg .robot-head {
            fill: var(--bg-secondary);
            stroke: var(--accent-secondary);
            stroke-width: 2;
        }
        .robot-svg .eye {
            fill: var(--accent-primary);
            animation: eyeBlink 4s ease-in-out infinite;
        }
        .robot-svg .robot-mouth {
            fill: var(--accent-tertiary);
        }
        .robot-svg .robot-antenna {
            stroke: var(--accent-tertiary);
            stroke-width: 2;
        }
        .robot-svg .antenna-ball {
            fill: var(--accent-tertiary);
            animation: antennaGlow 1.5s ease-in-out infinite;
        }
        .robot-svg .robot-arm {
            stroke: var(--accent-secondary);
            stroke-width: 3;
            stroke-linecap: round;
        }
        .robot-svg .paint-brush {
            fill: var(--accent-tertiary);
        }
        .robot-svg.drawing .robot-arm-left {
            animation: armDraw 1s ease-in-out infinite;
            transform-origin: 50% 50%;
        }
        .robot-svg.drawing .robot-arm-right {
            animation: armDraw2 1.2s ease-in-out infinite;
            transform-origin: 50% 50%;
        }
        .robot-svg.thinking .robot-head {
            animation: headBob 0.8s ease-in-out infinite;
        }

        @keyframes robotPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        @keyframes eyeBlink {
            0%, 45%, 55%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes antennaGlow {
            0%, 100% { filter: drop-shadow(0 0 3px var(--accent-tertiary)); }
            50% { filter: drop-shadow(0 0 8px var(--accent-tertiary)); }
        }
        @keyframes armDraw {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }
        @keyframes armDraw2 {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }
        @keyframes headBob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* Status Text */
        .robot-info {
            flex: 1;
        }
        .robot-status {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .robot-status.active {
            color: var(--accent-primary);
        }
        .robot-bubble {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 12px 16px;
            position: relative;
            margin-top: 8px;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .robot-bubble::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 15px;
            width: 0;
            height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-right: 10px solid var(--bg-secondary);
        }
        .typing-dots {
            display: inline-flex;
            gap: 4px;
        }
        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--accent-primary);
            border-radius: 50%;
            animation: typing 1s ease-in-out infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Chat Messages */
        .chat-messages {
            max-height: 280px;
            overflow-y: auto;
            padding: 12px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }
        .message.ai {
            align-self: flex-start;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .message.system {
            align-self: center;
            background: transparent;
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.85rem;
            text-align: center;
            max-width: 95%;
        }
        .message.error {
            align-self: center;
            background: rgba(255, 107, 157, 0.1);
            color: var(--error);
            border: 1px solid var(--error);
        }
        .chat-input-area {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            transition: all 0.3s;
            min-height: 44px;
        }
        .chat-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 12px rgba(0, 212, 170, 0.2);
        }
        .chat-input::placeholder {
            color: var(--text-muted);
        }
        .send-btn {
            padding: 0 20px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .send-btn:hover:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 212, 170, 0.3);
        }
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .send-btn svg { width: 20px; height: 20px; fill: white; }

        /* Right Panel - Image Generation */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Prompt Card */
        .prompt-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        .prompt-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-secondary), var(--accent-tertiary));
        }
        .prompt-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .prompt-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--accent-secondary), var(--accent-tertiary));
            border-radius: 2px;
        }
        .prompt-textarea {
            width: 100%;
            min-height: 100px;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.95rem;
            resize: vertical;
            outline: none;
            line-height: 1.6;
        }
        .prompt-textarea:focus {
            border-color: var(--accent-secondary);
            box-shadow: 0 0 12px rgba(123, 104, 238, 0.2);
        }
        .prompt-textarea::placeholder {
            color: var(--text-muted);
        }
        .char-counter {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
            margin-top: 8px;
        }

        /* Options */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }
        .option-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .option-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .option-select {
            padding: 10px 12px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
        }
        .option-select:focus {
            border-color: var(--accent-secondary);
        }

        /* Generate Button */
        .generate-btn {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: linear-gradient(135deg, var(--accent-secondary), var(--accent-tertiary));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.3);
        }
        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .generate-btn svg { width: 20px; height: 20px; }

        /* Image Result Card */
        .image-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .image-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-tertiary), var(--accent-primary));
        }
        .image-placeholder {
            text-align: center;
            color: var(--text-muted);
        }
        .image-placeholder svg {
            width: 60px;
            height: 60px;
            opacity: 0.4;
            margin-bottom: 12px;
        }
        .image-display {
            width: 100%;
            border-radius: 12px;
            display: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .image-actions {
            display: none;
            gap: 12px;
            margin-top: 16px;
            width: 100%;
        }
        .action-btn {
            flex: 1;
            padding: 10px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .action-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }
        .action-btn svg { width: 16px; height: 16px; }

        /* Loading animation */
        .loading-spinner {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        @media (max-width: 768px) {
            .top-bar { padding: 12px 16px; }
            .logo { font-size: 1.1rem; }
            .status-badge { font-size: 0.75rem; padding: 6px 10px; }
        }
    </style>
</head>
<body>
    <div class="background-effects">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>
    <div class="grid-bg"></div>

    <div class="top-bar">
        <a class="logo-area" href="#">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <div class="logo">AI PAINTER</div>
        </a>
        <div class="status-indicators">
            <div class="status-badge" id="apiStatus">
                <span class="status-dot"></span>
                <span>语言模型</span>
            </div>
        </div>
        <button class="settings-btn" id="settingsBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0-3 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-1.82-.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 1.82-.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>设置</span>
        </button>
    </div>

    <div class="main-container">
        <!-- Left Panel -->
        <div class="left-panel">
            <div class="robot-card">
                <div class="robot-container">
                    <svg class="robot-svg" id="robotSvg" viewBox="0 0 100 100">
                        <!-- Antenna -->
                        <line class="robot-antenna" x1="50" y1="15" x2="50" y2="5"/>
                        <circle class="antenna-ball" cx="50" cy="5" r="3"/>
                        <!-- Head -->
                        <rect class="robot-head" x="25" y="15" width="50" height="35" rx="8"/>
                        <!-- Eyes -->
                        <circle class="robot-eye" cx="40" cy="32" r="4"/>
                        <circle class="robot-eye" cx="60" cy="32" r="4"/>
                        <!-- Mouth -->
                        <rect class="robot-mouth" x="40" y="42" width="20" height="4" rx="2"/>
                        <!-- Body -->
                        <rect class="robot-body" x="30" y="55" width="40" height="30" rx="6"/>
                        <!-- Left Arm -->
                        <line class="robot-arm robot-arm-left" x1="30" y1="65" x2="18" y2="75"/>
                        <circle cx="15" cy="78" r="4" fill="var(--accent-secondary)"/>
                        <!-- Right Arm with brush -->
                        <line class="robot-arm robot-arm-right" x1="70" y1="65" x2="85" y2="78"/>
                        <circle cx="88" cy="80" r="4" fill="var(--accent-tertiary)"/>
                        <rect class="paint-brush" x="89" y="78" width="3" height="8" rx="1"/>
                    </svg>
                    <div class="robot-info">
                        <div class="robot-status" id="robotStatus">等待你的创意...</div>
                        <div class="robot-bubble" id="robotBubble">
                            嗨！我是小画师，告诉我你想画什么？
                        </div>
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages"></div>

                <div class="chat-input-area">
                    <textarea class="chat-input" id="chatInput" placeholder="和我聊聊你的创意想法..." rows="1"></textarea>
                    <button class="send-btn" id="chatSendBtn">
                        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <div class="prompt-card">
                <div class="prompt-title">绘图提示词</div>
                <textarea class="prompt-textarea" id="promptInput" placeholder="描述你想要生成的图像...&#10;例如：一只在星空下飞行的猫咪，梦幻风格"></textarea>
                <div class="char-counter"><span id="charCount">0</span> / 1000</div>

                <div class="options-grid">
                    <div class="option-group">
                        <label class="option-label">图片尺寸</label>
                        <select class="option-select" id="imageSize">
                            <option value="1024x1024">正方形 (1024×1024)</option>
                            <option value="1024x1792">竖版 (1024×1792)</option>
                            <option value="1792x1024">横版 (1792×1024)</option>
                        </select>
                    </div>
                    <div class="option-group">
                        <label class="option-label">风格</label>
                        <select class="option-select" id="imageStyle">
                            <option value="realistic">写实</option>
                            <option value="anime">动漫</option>
                            <option value="oil painting">油画</option>
                            <option value="watercolor">水彩</option>
                            <option value="3d render">3D渲染</option>
                        </select>
                    </div>
                </div>

                <button class="generate-btn" id="generateBtn">
                    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/></svg>
                    <span>生成图像</span>
                </button>
            </div>

            <div class="image-card">
                <div class="image-placeholder" id="imagePlaceholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <div>生成的图像将显示在这里</div>
                </div>
                <div class="loading-spinner" id="loadingSpinner">
                    <div class="spinner"></div>
                    <div class="loading-text">正在生成图像...</div>
                </div>
                <img class="image-display" id="resultImage" alt="Generated image">
                <div class="image-actions" id="imageActions">
                    <button class="action-btn" id="downloadBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        下载
                    </button>
                    <button class="action-btn" id="copyPromptBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        复制提示词
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:var(--bg-card); border:1px solid var(--border-color); border-radius:20px; padding:30px; max-width:500px; width:90%;">
            <h2 style="font-size:1.3rem; margin-bottom:20px;">API 设置</h2>
            <div style="margin-bottom:20px;">
                <label style="display:block; font-size:0.9rem; color:var(--text-secondary); margin-bottom:8px;">DeepSeek API Key</label>
                <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxxxxxx" style="width:100%; padding:12px 16px; background:var(--bg-secondary); border:2px solid var(--border-color); border-radius:8px; color:var(--text-primary); font-size:0.9rem;">
            </div>
            <div style="display:flex; gap:10px; margin-bottom:12px;">
                <button id="saveSettings" style="flex:1; padding:12px; background:linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); border:none; border-radius:8px; color:white; font-weight:500; cursor:pointer;">保存</button>
                <button id="testSettings" style="flex:1; padding:12px; background:var(--bg-secondary); border:2px solid var(--accent-primary); border-radius:8px; color:var(--accent-primary); font-weight:500; cursor:pointer;">测试连接</button>
                <button id="closeSettings" style="flex:1; padding:12px; background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:8px; color:var(--text-secondary); cursor:pointer;">关闭</button>
            </div>
            <div id="testResult" style="margin-bottom:12px; font-size:0.85rem; color:var(--accent-primary); padding:10px; background:rgba(0,212,170,0.1); border-radius:8px; display:none;"></div>
            <p style="margin-top:16px; font-size:0.8rem; color:var(--text-muted); line-height:1.5;">
                💡 <strong>使用说明：</strong><br>
                • <strong>AI 对话</strong>：需要配置 DeepSeek API Key<br>
                • <strong>图像生成</strong>：使用免费服务，不需要 API Key<br>
                • <strong>API Key 保存位置</strong>：仅保存在你的浏览器中（localStorage）<br>
                • <strong>获取 API Key</strong>：<a href="https://platform.deepseek.com" target="_blank" style="color:var(--accent-primary);">点击访问 DeepSeek 官网</a>
            </p>
        </div>
    </div>

    <script>
        // 配置
        // 将此地址改为你的后端服务地址（部署后替换）
        const API_BASE_URL = '';  // 如果为空则直接调用 DeepSeek API
        
        // State
        const state = {
            apiKey: localStorage.getItem('deepseek_api_key') || '',
            isProcessing: false,
            conversation: [],
            currentImageUrl: null
        };

        // 获取 API 地址
        function getApiUrl(endpoint) {
            if (API_BASE_URL) {
                return `${API_BASE_URL}${endpoint}`;
            }
            // 如果没有配置后端地址，直接调用 DeepSeek API
            return `https://api.deepseek.com/v1${endpoint}`;
        }

        // Elements
        const robotSvg = document.getElementById('robotSvg');
        const robotStatus = document.getElementById('robotStatus');
        const robotBubble = document.getElementById('robotBubble');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const promptInput = document.getElementById('promptInput');
        const charCount = document.getElementById('charCount');
        const generateBtn = document.getElementById('generateBtn');
        const imageSize = document.getElementById('imageSize');
        const imageStyle = document.getElementById('imageStyle');
        const imagePlaceholder = document.getElementById('imagePlaceholder');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const resultImage = document.getElementById('resultImage');
        const imageActions = document.getElementById('imageActions');
        const downloadBtn = document.getElementById('downloadBtn');
        const copyPromptBtn = document.getElementById('copyPromptBtn');
        const apiStatus = document.getElementById('apiStatus');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveSettings = document.getElementById('saveSettings');
        const closeSettings = document.getElementById('closeSettings');

        // API Status
        function updateApiStatus() {
            if (state.apiKey) {
                apiStatus.classList.add('active');
            } else {
                apiStatus.classList.remove('active');
            }
        }
        updateApiStatus();

        // Robot animation states
        function setRobotState(stateName) {
            robotSvg.classList.remove('drawing', 'thinking');
            if (stateName === 'thinking') {
                robotSvg.classList.add('thinking');
                robotStatus.textContent = '正在思考...';
                robotBubble.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';
            } else if (stateName === 'drawing') {
                robotSvg.classList.add('drawing');
                robotStatus.textContent = '正在创作...';
                robotBubble.innerHTML = '我正在努力画画中...';
            } else {
                robotStatus.textContent = '等待你的创意...';
                robotBubble.textContent = '嗨！我是小画师，告诉我你想画什么？';
            }
        }

        // Character counter
        promptInput.addEventListener('input', () => {
            charCount.textContent = promptInput.value.length;
        });

        // Add message to chat
        function addMessage(content, type) {
            const msg = document.createElement('div');
            msg.className = 'message ' + type;
            msg.textContent = content;
            chatMessages.appendChild(msg);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Settings modal
        settingsBtn.addEventListener('click', () => {
            apiKeyInput.value = state.apiKey;
            settingsModal.style.display = 'flex';
        });

        closeSettings.addEventListener('click', () => {
            settingsModal.style.display = 'none';
        });

        saveSettings.addEventListener('click', () => {
            state.apiKey = apiKeyInput.value.trim();
            localStorage.setItem('deepseek_api_key', state.apiKey);
            updateApiStatus();
            settingsModal.style.display = 'none';
        });

        testSettings.addEventListener('click', async () => {
            const key = apiKeyInput.value.trim();
            if (!key) {
                showTestResult('⚠️ 请先输入 API Key', false);
                return;
            }

            showTestResult('⏳ 正在测试连接...', true);
            const result = await testApiKey(key);
            showTestResult(result.message, result.success);
        });

        function showTestResult(message, success) {
            const resultEl = document.getElementById('testResult');
            resultEl.style.display = 'block';
            resultEl.textContent = message;
            resultEl.style.color = success ? 'var(--accent-primary)' : '#ff6b9d';
            resultEl.style.background = success ? 'rgba(0,212,170,0.1)' : 'rgba(255,107,157,0.1)';
        }

        // DeepSeek API call function - 通过后端或直接调用
        async function callDeepSeek(messages) {
            console.log('🔍 [API调用] 开始请求...');
            console.log('🔑 [API Key]', state.apiKey ? '已配置 (长度: ' + state.apiKey.length + ')' : '未配置');
            console.log('🌐 [模式]', API_BASE_URL ? '后端代理' : '直接调用');
            console.log('📝 [消息]', messages);

            let response, data;

            if (API_BASE_URL) {
                // 通过后端代理
                console.log('🔄 [后端] 调用中转服务...');
                response = await fetch(getApiUrl('/api/chat'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: messages,
                        apiKey: state.apiKey  // 如果后端没有配置 API Key，则传递
                    })
                });
            } else {
                // 直接调用 DeepSeek API
                console.log('🔄 [直连] 直接调用 DeepSeek API...');
                response = await fetch(getApiUrl('/chat/completions'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + state.apiKey
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: messages,
                        temperature: 0.7
                    })
                });
            }

            console.log('📊 [响应状态] HTTP', response.status);
            data = await response.json();
            console.log('📦 [响应数据]', data);

            if (!response.ok) {
                const errorMsg = data.error?.message || data.message ||
                                 data.error || 'API 错误 (HTTP ' + response.status + ')';
                console.error('❌ [API 错误]', errorMsg);
                throw new Error(errorMsg);
            }

            // 根据调用模式解析响应
            let content;
            if (API_BASE_URL) {
                // 后端返回的是 OpenAI 格式
                content = data.choices?.[0]?.message?.content || '';
            } else {
                // 直接调用 DeepSeek
                content = data.choices?.[0]?.message?.content || '';
            }

            console.log('✅ [成功] 收到回复:', content.substring(0, 50) + '...');
            return content;
        }

        // 测试 API Key 的函数
        async function testApiKey(apiKey) {
            try {
                let response;

                if (API_BASE_URL) {
                    // 通过后端测试
                    response = await fetch(getApiUrl('/api/test'), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ apiKey: apiKey })
                    });
                    const data = await response.json();
                    return data;
                } else {
                    // 直接测试 DeepSeek API
                    response = await fetch(getApiUrl('/chat/completions'), {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + apiKey
                        },
                        body: JSON.stringify({
                            model: 'deepseek-chat',
                            messages: [{ role: 'user', content: 'hi' }],
                            max_tokens: 5
                        })
                    });

                    if (response.ok) {
                        return { success: true, message: '✅ API Key 验证成功！' };
                    } else {
                        const data = await response.json();
                        const errorMsg = data.error?.message || data.error || 'HTTP ' + response.status;
                        return { success: false, message: '❌ API Key 错误: ' + errorMsg };
                    }
                }
            } catch (error) {
                return { success: false, message: '❌ 请求失败: ' + error.message };
            }
        }

        // Chat with AI
        chatSendBtn.addEventListener('click', async () => {
            const message = chatInput.value.trim();
            if (!message || state.isProcessing) return;

            state.isProcessing = true;
            chatSendBtn.disabled = true;
            addMessage(message, 'user');
            chatInput.value = '';
            setRobotState('thinking');

            try {
                const messages = [
                    { role: 'system', content: '你是一位专业的 AI 绘画助手。用户会描述他们想要的图像，你的任务是：\n1. 理解用户需求\n2. 用中文友好地回应用户\n3. 给出优化后的绘图提示词（English prompt）\n4. 保持回复简练，不超过100字' },
                    { role: 'user', content: message }
                ];

                const aiResponse = await callDeepSeek(messages);

                if (aiResponse) {
                    addMessage(aiResponse, 'ai');

                    // Auto-fill prompt if user described an image idea
                    if (message.length > 10) {
                        promptInput.value = message;
                        charCount.textContent = message.length;
                    }
                } else {
                    addMessage('抱歉，我没有理解你的意思，请重试。', 'error');
                }

                setRobotState('idle');

            } catch (error) {
                console.error('API Error:', error);
                addMessage('错误: ' + error.message, 'error');
                setRobotState('idle');
            }

            state.isProcessing = false;
            chatSendBtn.disabled = false;
        });

        // Generate image
        generateBtn.addEventListener('click', async () => {
            const prompt = promptInput.value.trim();
            if (!prompt || state.isProcessing) return;

            state.isProcessing = true;
            generateBtn.disabled = true;
            setRobotState('drawing');

            // Show loading
            imagePlaceholder.style.display = 'none';
            loadingSpinner.style.display = 'flex';
            resultImage.style.display = 'none';
            imageActions.style.display = 'none';

            try {
                const size = imageSize.value;
                const [width, height] = size.split('x');
                const style = imageStyle.options[imageStyle.selectedIndex].text;

                // Build enhanced prompt
                const finalPrompt = prompt + ', ' + style + ', high quality, detailed';

                console.log('🎨 [图像生成] 开始...');
                console.log('📝 提示词:', finalPrompt);
                console.log('📐 尺寸:', width, 'x', height);
                console.log('🌐 [模式]', API_BASE_URL ? '后端代理' : '直接调用');

                let imageUrl;

                if (API_BASE_URL) {
                    // 通过后端代理生成图像
                    console.log('🔄 [后端] 调用图像生成服务...');
                    const response = await fetch(getApiUrl('/api/generate-image'), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            prompt: prompt,
                            width: parseInt(width),
                            height: parseInt(height),
                            style: style
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || '图像生成失败');
                    }

                    imageUrl = data.imageUrl;
                    console.log('✅ [图像生成] 成功:', imageUrl);
                } else {
                    // 直接使用 Pollinations.ai
                    imageUrl = 'https://image.pollinations.ai/prompt/' + 
                        encodeURIComponent(finalPrompt) +
                        '?width=' + width + '&height=' + height + '&nologo=true';
                }

                // Preload image
                const img = new Image();
                img.crossOrigin = 'anonymous';

                img.onload = () => {
                    resultImage.src = imageUrl;
                    state.currentImageUrl = imageUrl;
                    loadingSpinner.style.display = 'none';
                    resultImage.style.display = 'block';
                    imageActions.style.display = 'flex';
                    setRobotState('idle');
                };

                img.onerror = () => {
                    loadingSpinner.style.display = 'none';
                    imagePlaceholder.style.display = 'block';
                    addMessage('图像生成失败，请重试或使用其他提示词', 'error');
                    setRobotState('idle');
                };

                // Start loading
                img.src = imageUrl;

            } catch (error) {
                console.error('❌ [图像生成] 错误:', error);
                loadingSpinner.style.display = 'none';
                imagePlaceholder.style.display = 'block';
                addMessage('错误: ' + error.message, 'error');
                setRobotState('idle');
            }

            state.isProcessing = false;
            generateBtn.disabled = false;
        });

        // Download image
        downloadBtn.addEventListener('click', () => {
            if (!state.currentImageUrl) return;
            window.open(state.currentImageUrl, '_blank');
        });

        // Copy prompt
        copyPromptBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(promptInput.value);
            const original = copyPromptBtn.innerHTML;
            copyPromptBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>已复制';
            setTimeout(() => { copyPromptBtn.innerHTML = original; }, 2000);
        });

        // Enter to send chat
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatSendBtn.click();
            }
        });

        // Ctrl+Enter to generate
        promptInput.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                generateBtn.click();
            }
        });

        // Welcome message
        addMessage('欢迎使用 AI 绘画工坊！请先点击右上角 ⚙️ 设置按钮，配置你的 DeepSeek API Key，然后就可以开始创作了！\n\n💡 提示：\n• 语言模型 - 用于和你对话，优化创意描述\n• 图像生成 - 使用免费的 Pollinations.ai 服务\n• 你可以直接在右侧输入提示词，或在左侧与AI对话', 'system');
    </script>
</body>
</html>
